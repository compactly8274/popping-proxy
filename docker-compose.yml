# docker-compose.yml — runs popping-proxy using the pre-built image
# from GitHub Container Registry. To pin to a specific release,
# change `:latest` to a version tag (e.g. `:0.1.0`) or a SHA tag
# (e.g. `:sha-83fc640`).
#
# To build from source instead of pulling the pre-built image,
# comment out the `image:` line and uncomment `build: .`. You'll
# need the Dockerfile (already in this repo) and a working Docker
# build context.
#
# Required env / setup
# --------------------
# The defaults in this file assume the canonical deploy: image pulled
# from `ghcr.io/compactly8274/popping-proxy` and a contact UA pointing
# at phil@philjnewman.com. Fork deploys should:
# 1. Change the `image:` line to your own GHCR namespace.
# 2. Override USER_AGENT to your own contact string. Reddit's
#    anti-abuse will 403 you within hours of polling cadence if
#    the UA is generic. The pattern Reddit's docs recommend is
#    `<app>/<version> (+<project-url>; contact: <real-email>)`.
# 3. Set WEBSHARE_TOKEN to your Webshare residential proxy token
#    (format `USERNAME-PASSWORD`, a dash not a colon). Without it,
#    Reddit CDN-level blocks the VPS's datacenter IP within hours
#    of polling cadence. Sign up at https://webshare.io
#    (~$3.50/month for 1GB, plenty for Popping's cadence).
# 4. Bind to localhost only — terminate TLS at your existing
#    reverse proxy (Caddy / Traefik / nginx / NPM) and forward your
#    chosen proxy hostname to 127.0.0.1:3001.

services:
  popping-proxy:
    image: ghcr.io/compactly8274/popping-proxy:latest
    # build: .   # uncomment to build from source instead of pulling
    restart: unless-stopped
    pull_policy: always
    # Plain Bun app. No WARP, no caps, no sysctls — Reddit traffic
    # is routed through the Webshare HTTP proxy via Bun's fetch
    # `proxy` option.
    environment:
      PORT: "3001"
      USER_AGENT: "popping-proxy/1.0 (+https://github.com/compactly8274/popping-proxy; contact: phil@philjnewman.com)"
      # 2 req/s sustained, 4 burst. Popping's cross-ref sweep fires
      # ~50 requests in a tight loop; the limiter spreads them out
      # so Webshare (and Reddit) sees a polite cadence.
      RATE_SUSTAINED: "2"
      RATE_BURST: "4"
      UPSTREAM_TIMEOUT_S: "10"
      # Webshare residential proxy pool. The token they issue
      # (`USERNAME-PASSWORD`, dash not colon) gets split on the
      # first dash and re-stitched as `http://user:pass@p.webshare.io:80`,
      # passed to Bun's `fetch` via the `proxy` option. Without
      # this, requests go direct from the VPS and Reddit CDN-blocks
      # the datacenter IP within hours of polling cadence.
      WEBSHARE_TOKEN: "username-password"
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
